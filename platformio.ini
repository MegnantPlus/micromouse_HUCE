; CẤU HÌNH CHO ESP32-S3 N16R8 (16MB FLASH - 8MB PSRAM OPI)
[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- [1] CẤU HÌNH BỘ NHỚ KHỦNG (QUAN TRỌNG NHẤT) ---
; Khai báo dung lượng Flash thực tế là 16MB (Mặc định nó chỉ hiểu 4MB)
board_upload.flash_size = 16MB

; Chọn bảng phân vùng dành cho 16MB (Để ông nạp code to thoải mái)
board_build.partitions = default_16MB.csv

; Chế độ bộ nhớ: QIO cho Flash và OPI cho PSRAM (Bắt buộc cho R8)
board_build.arduino.memory_type = qio_opi 

; --- [2] CẤU HÌNH TỐC ĐỘ & ÉP XUNG ---
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L       ; Ép xung CPU 240MHz
board_build.f_flash = 80000000L      ; Ép xung Flash 80MHz
board_build.flash_mode = qio         ; Đọc Flash nhanh nhất (4 đường)

; --- [3] CÁC CỜ BIÊN DỊCH (BUILD FLAGS) ---
build_flags = 
    -DBOARD_HAS_PSRAM                ; <--- CỜ KÍCH HOẠT 8MB RAM (Rất quan trọng)
    -mfix-esp32-psram-cache-issue    ; Fix lỗi cache nếu có
    -DARDUINO_USB_CDC_ON_BOOT=1      ; Để Serial Monitor chạy qua cổng USB-C
    -DARDUINO_USB_MODE=1
    -O3                              ; Tối ưu hóa tốc độ xử lý mức cao nhất

; ---------------------------------------------------
lib_deps = 
    ; Thư viện MPU6050 chuẩn (có sẵn DMP 6Axis)
    electroniccats/MPU6050 @ ^1.3.0
    ; Thư viện điều khiển LED RGB
    adafruit/Adafruit NeoPixel @ ^1.12.0